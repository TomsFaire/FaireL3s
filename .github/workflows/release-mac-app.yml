# Build a macOS .app (Electrobun + PyInstaller backend) when a release is published.
name: Release macOS app

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      tag:
        description: 'Release tag to upload build to'
        required: true
        default: '0.0.8'

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  build-mac-app:
    runs-on: macos-latest
    permissions:
      contents: write
    env:
      RELEASE_TAG: ${{ github.event_name == 'release' && github.ref_name || github.event.inputs.tag }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Build Python backend (PyInstaller one-folder)
        run: pyinstaller -y l3rd_backend.spec

      - name: Copy backend into Electrobun resources
        run: |
          rm -rf electrobun/resources/python-backend
          cp -R dist/FaireL3s/ electrobun/resources/python-backend/

      - name: Build Electrobun app
        run: |
          cd electrobun
          bun install
          bun run build

      - name: Zip .app
        run: |
          APP_PATH="$(find electrobun/dist -name '*.app' -maxdepth 2 | head -1)"
          if [ -z "$APP_PATH" ]; then
            echo "ERROR: Could not find .app in electrobun/dist/"
            exit 1
          fi
          ditto -c -k --sequesterRsrc --keepParent "$APP_PATH" FaireL3s-macOS.zip

      - name: Upload to release
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release upload "$RELEASE_TAG" FaireL3s-macOS.zip --clobber
