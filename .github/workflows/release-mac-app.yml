# Build a macOS .app when a release is published and upload it as a release asset.
name: Release macOS app

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      tag:
        description: 'Release tag to upload build to'
        required: true
        default: '0.0.6'

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  build-mac-app:
    runs-on: macos-latest
    permissions:
      contents: write
    env:
      RELEASE_TAG: ${{ github.event_name == 'release' && github.ref_name || github.event.inputs.tag }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Build .app with PyInstaller
        run: pyinstaller -y l3rd_app_mac.spec

      - name: Zip .app
        run: ditto -c -k --sequesterRsrc --keepParent dist/FaireL3s.app FaireL3s-macOS.zip

      - name: Upload to release
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release upload "$RELEASE_TAG" FaireL3s-macOS.zip --clobber
