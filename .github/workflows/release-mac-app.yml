# Build a macOS .app when a release is published and upload it as a release asset.
name: Release macOS app

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      tag:
        description: 'Release tag to upload build to'
        required: true
        default: '0.0.6'

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  build-mac-app:
    runs-on: macos-latest
    permissions:
      contents: write  # upload release asset
    env:
      RELEASE_TAG: ${{ github.event_name == 'release' && github.ref_name || github.event.inputs.tag }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Build with PyInstaller (one-dir)
        run: pyinstaller l3rd_app_mac.spec

      - name: Create .app bundle
        run: |
          mkdir -p FaireL3s.app/Contents/MacOS
          cp -R dist/FaireL3s/* FaireL3s.app/Contents/MacOS/
          chmod +x FaireL3s.app/Contents/MacOS/FaireL3s
          cat > FaireL3s.app/Contents/Info.plist << PLIST
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>CFBundleExecutable</key>
            <string>FaireL3s</string>
            <key>CFBundleIdentifier</key>
            <string>com.faire.lowerthirds</string>
            <key>CFBundleName</key>
            <string>Faire Lower 3rds</string>
            <key>CFBundleDisplayName</key>
            <string>Faire Lower 3rds</string>
            <key>CFBundlePackageType</key>
            <string>APPL</string>
            <key>CFBundleShortVersionString</key>
            <string>${RELEASE_TAG}</string>
            <key>CFBundleVersion</key>
            <string>${RELEASE_TAG}</string>
            <key>NSHighResolutionCapable</key>
            <true/>
          </dict>
          </plist>
          PLIST

      - name: Fix Python library path for .app
        run: |
          mkdir -p FaireL3s.app/Contents/Frameworks
          MACOS=FaireL3s.app/Contents/MacOS
          if [ -f "$MACOS/Python" ]; then
            cp -f "$MACOS/Python" FaireL3s.app/Contents/Frameworks/Python
          elif ls "$MACOS"/libpython*.dylib 1>/dev/null 2>&1; then
            cp -f "$MACOS"/libpython*.dylib FaireL3s.app/Contents/Frameworks/Python
          fi

      - name: Zip .app
        run: |
          ditto -c -k --sequesterRsrc --keepParent FaireL3s.app FaireL3s-macOS.zip

      - name: Upload to release
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release upload "$RELEASE_TAG" FaireL3s-macOS.zip --clobber
